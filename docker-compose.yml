version: "3.8"

services:
  # ─────────────────── MySQL 8.0 ───────────────────
  mysql:
    image: mysql:latest
    container_name: rec-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: rec_agent
      MYSQL_CHARSET: utf8mb4
    ports:
      - "23306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── Redis ───────────────────
  redis:
    image: redis:8.4
    container_name: rec-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────── Elasticsearch 8.x ───────────────────
  elasticsearch:
    image: elasticsearch:9.3.0
    container_name: rec-elasticsearch
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        if ! /usr/share/elasticsearch/bin/elasticsearch-plugin list | grep -q "^analysis-ik$"; then
          /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch analysis-ik;
        fi
        exec /usr/local/bin/docker-entrypoint.sh
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=AuM_JuNzR3kzOW=vkNYA
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "29200:9200"
    volumes:
      - ./volumes/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:AuM_JuNzR3kzOW=vkNYA http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────── Milvus Standalone ───────────────────
  milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: milvus-standalone
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /milvus/configs &&
        cat > /milvus/configs/embedEtcd.yaml <<'EOF'
        listen-client-urls: http://0.0.0.0:2379
        advertise-client-urls: http://0.0.0.0:2379
        quota-backend-bytes: 4294967296
        auto-compaction-mode: revision
        auto-compaction-retention: '1000'
        EOF
        cat > /milvus/configs/user.yaml <<'EOF'
        # Extra config to override default milvus.yaml
        EOF
        exec milvus run standalone
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      ETCD_CONFIG_PATH: /milvus/configs/embedEtcd.yaml
      COMMON_STORAGETYPE: local
      DEPLOY_MODE: STANDALONE
    ports:
      - "19530:19530"
      - "9091:9091"
      - "2379:2379"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

volumes:
  mysql_data:
  milvus_data:
